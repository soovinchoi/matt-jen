<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPA210 Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  background:#0f0f10;
  font-family:'Cormorant Garamond', serif;
  color:#f4f1ea;
  overflow:hidden;
}

/* ===== CENTER ===== */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.stack{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* text */
.title{
  font-family:'Cinzel', serif;
  font-size:clamp(24px,5vw,32px);
  letter-spacing:.22em;
}

/* 👇 THIS IS OUR ANCHOR HEIGHT */
.titleAnchor{
  height:60px;
}

.subtitle{
  font-family:'Cinzel', serif;
  font-size:clamp(11px,3vw,14px);
  letter-spacing:.35em;
  opacity:.85;
}

/* image */
.heroImg{
  width:85vw;
  max-width:480px;
  max-height:55vh;
  object-fit:contain;
  border-radius:10px;
}

/* button */
.enterBtn{
  padding:12px 28px;
  border-radius:999px;
  border:1.5px solid #f4f1ea;
  background:transparent;
  color:#f4f1ea;
  font-family:'Cinzel', serif;
  letter-spacing:.25em;
  cursor:pointer;
}

/* ===== BEES (ALIGNED TO TITLE HEIGHT) ===== */
.bee{
  position:fixed;
  width:clamp(55px,10vw,75px);
  display:none;
  pointer-events:none;
}

/* 👇 aligned to title area */
#bee1{ top:calc(50% - 160px); left:-120px; }
#bee2{ top:calc(50% - 120px); left:-140px; }
#bee3{ top:calc(50% - 140px); right:-120px; }

/* ===== LETTER ===== */
#letter{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  cursor:pointer;
}

.letterImg{
  width:clamp(220px,50vw,300px);
}

/* ===== HINT ===== */
#hint{
  position:fixed;
  top:calc(50% + 160px);
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  font-family:'Cinzel', serif;
}

/* ===== INVITE ===== */
#invite{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
}

.card{
  width:90vw;
  max-width:700px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="stack">
    <div class="title">SPA210</div>
    <div class="subtitle">PRIVATE OPENING</div>
    <img src="spa.png" class="heroImg">
    <div class="enterBtn">ENTER</div>
  </div>
</div>

<!-- BEES -->
<img src="bee1.png" class="bee" id="bee1">
<img src="bee2.png" class="bee" id="bee2">
<img src="bee3.png" class="bee" id="bee3">

<!-- LETTER -->
<div id="letter">
  <img src="letter.png" class="letterImg">
</div>

<div id="hint">Tap the letter</div>

<!-- INVITE -->
<div id="invite">
  <img src="invite.png" class="card">
</div>

<audio id="zen" loop>
<source src="zen.mp3">
</audio>

<script>
const enterBtn=document.querySelector(".enterBtn");
const bee1=document.getElementById("bee1");
const bee2=document.getElementById("bee2");
const bee3=document.getElementById("bee3");
const letter=document.getElementById("letter");
const hint=document.getElementById("hint");
const invite=document.getElementById("invite");
const zen=document.getElementById("zen");

enterBtn.onclick=()=>{
document.getElementById("intro").style.display="none";

/* show bees */
bee1.style.display="block";
bee2.style.display="block";
bee3.style.display="block";

/* music */
zen.volume=0.3;
zen.play();

/* bees */
bee1.animate([{transform:"translate(0,0)"},{transform:"translate(100vw,-10px)"}],{duration:4200});
bee2.animate([{transform:"translate(0,0)"},{transform:"translate(110vw,10px)"}],{duration:5000});
bee3.animate([{transform:"translate(0,0)"},{transform:"translate(-100vw,-15px)"}],{duration:4600});

/* letter */
setTimeout(()=>{letter.style.opacity=1},4600);
setTimeout(()=>{hint.style.opacity=1},7800);
};

letter.onclick=()=>{
bee1.style.display="none";
bee2.style.display="none";
bee3.style.display="none";
letter.style.display="none";
hint.style.display="none";
invite.style.display="block";
};
</script>

</body>
</html>
