<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPA210 Private Opening</title>

<style>

body{
margin:0;
padding:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Georgia, serif;
color:white;
overflow:hidden;
}

.container{
text-align:center;
position:relative;
}

.title{
font-size:32px;
letter-spacing:4px;
margin-bottom:20px;
}

.image-box{
position:relative;
display:inline-block;
}

.main-image{
width:420px;
border-radius:10px;
}

.enter{
margin-top:20px;
font-size:22px;
letter-spacing:6px;
cursor:pointer;
transition:0.3s;
}

.enter:hover{
opacity:0.6;
}

/* bees */

.bee{
position:absolute;
width:60px;
pointer-events:none;
}

/* bee 1 */
.bee1{
top:-40px;
left:-60px;
animation:beeFloat1 6s infinite ease-in-out;
}

/* bee 2 */
.bee2{
top:40%;
right:-70px;
animation:beeFloat2 7s infinite linear;
}

/* bee 3 */
.bee3{
bottom:-50px;
left:40%;
animation:beeFloat3 5s infinite ease-in-out;
}

/* animations */

@keyframes beeFloat1{
0%{transform:translate(0,0) rotate(0deg);}
25%{transform:translate(40px,-20px) rotate(10deg);}
50%{transform:translate(80px,10px) rotate(-10deg);}
75%{transform:translate(40px,20px) rotate(5deg);}
100%{transform:translate(0,0) rotate(0deg);}
}

@keyframes beeFloat2{
0%{transform:translate(0,0);}
50%{transform:translate(-60px,-40px);}
100%{transform:translate(0,0);}
}

@keyframes beeFloat3{
0%{transform:translate(0,0);}
50%{transform:translate(20px,-50px);}
100%{transform:translate(0,0);}
}

</style>
</head>

<body>

<div class="container">

<div class="title">SPA210 PRIVATE OPENING</div>

<div class="image-box">

<img class="main-image" src="YOUR_MAIN_IMAGE.jpg">

<img class="bee bee1" src="YOUR_BEE1.png">
<img class="bee bee2" src="YOUR_BEE2.png">
<img class="bee bee3" src="YOUR_BEE3.png">

</div>

<div class="enter">ENTER</div>

</div>

</body>
