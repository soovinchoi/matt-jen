<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPA210 Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:#0f0f10;
font-family:'Cormorant Garamond', serif;
color:#f4f1ea;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:28px;
z-index:10;
}

.title{
font-family:'Cinzel', serif;
font-size:28px;
letter-spacing:.22em;
text-align:center;
}

.subtitle{
font-family:'Cinzel', serif;
font-size:13px;
letter-spacing:.35em;
opacity:.85;
text-align:center;
}

.heroImg{
width:88vw;
max-width:520px;
max-height:55vh;
object-fit:contain;
box-shadow:0 24px 70px rgba(0,0,0,.55);
border-radius:10px;
}

.enterBtn{
padding:14px 36px;
border-radius:999px;
border:1.5px solid #f4f1ea;
background:transparent;
color:#f4f1ea;
font-family:'Cinzel', serif;
font-size:14px;
letter-spacing:.25em;
cursor:pointer;
}

/* STEAM */
.steam{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:1;
}

.steam span{
position:absolute;
bottom:-120px;
width:160px;
height:160px;
border-radius:50%;
background:radial-gradient(circle,
rgba(255,255,255,.16) 0%,
rgba(255,255,255,.07) 40%,
transparent 70%);
filter:blur(10px);
animation:steamUp linear infinite;
opacity:0;
}

.steam span:nth-child(1){left:10%;animation-duration:22s}
.steam span:nth-child(2){left:30%;animation-duration:26s;animation-delay:4s}
.steam span:nth-child(3){left:55%;animation-duration:24s;animation-delay:2s}

@keyframes steamUp{
0%{transform:translateY(0) scale(.8);opacity:0}
15%{opacity:.25}
50%{opacity:.18}
100%{transform:translateY(-110vh) scale(1.4);opacity:0}
}

/* 🐝 BEES (FIXED + HIDDEN INITIALLY) */
.bee{
position:fixed;
width:clamp(55px, 10vw, 80px);
pointer-events:none;
display:none;
}

#bee1{ top:6%; left:-140px; }
#bee2{ top:16%; left:-160px; }
#bee3{ top:12%; right:-140px; }

/* LETTER */
#letter{
position:absolute;
top:42%;
left:50%;
transform:translateX(-50%);
opacity:0;
cursor:pointer;
}

.letterImg{ width:300px; }

/* HINT */
#hint{
position:absolute;
top:calc(42% + 320px);
left:50%;
transform:translateX(-50%);
font-family:'Cinzel', serif;
font-size:16px;
letter-spacing:4px;
opacity:0;
}

/* INVITE */
#invite{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
}

.scrollWrap{
position:relative;
width:90vw;
max-width:760px;
}

.scrollTop,.scrollBottom{
position:absolute;
left:0;
width:100%;
height:50%;
background:#0f0f10;
z-index:2;
}

.scrollTop{top:0;transform-origin:top;animation:openTop 1.2s forwards}
.scrollBottom{bottom:0;transform-origin:bottom;animation:openBottom 1.2s forwards}

@keyframes openTop{to{transform:scaleY(0)}}
@keyframes openBottom{to{transform:scaleY(0)}}

.card{
width:100%;
border-radius:8px;
box-shadow:0 24px 70px rgba(0,0,0,.6);
}

/* SHIMMER */
.cardWrap{position:relative}
.cardWrap::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(120deg,
transparent 0%,
rgba(255,215,120,.55) 50%,
transparent 100%);
transform:translateX(-120%);
}
.cardWrap.shimmer::after{
animation:goldSweep 1.8s forwards;
}
@keyframes goldSweep{to{transform:translateX(120%)}}
</style>
</head>

<body>

<div id="intro">
<div>
<div class="title">SPA210</div>
<div class="subtitle">PRIVATE OPENING</div>
</div>

<img src="spa.png" class="heroImg">
<div class="enterBtn">ENTER</div>
</div>

<div class="steam"><span></span><span></span><span></span></div>

<!-- 🐝 BEES -->
<img src="bee1.png" class="bee" id="bee1">
<img src="bee2.png" class="bee" id="bee2">
<img src="bee3.png" class="bee" id="bee3">

<div id="letter"><img src="letter.png" class="letterImg"></div>
<div id="hint">Tap the letter</div>

<div id="invite">
<div class="scrollWrap">
<div class="scrollTop"></div>
<div class="scrollBottom"></div>
<div class="cardWrap">
<img src="invite.png" class="card">
</div>
</div>
</div>

<audio id="zen" loop>
<source src="zen.mp3">
</audio>

<script>
const enterBtn=document.querySelector(".enterBtn");
const bee1=document.getElementById("bee1");
const bee2=document.getElementById("bee2");
const bee3=document.getElementById("bee3");
const letter=document.getElementById("letter");
const hint=document.getElementById("hint");
const invite=document.getElementById("invite");
const zen=document.getElementById("zen");
const cardWrap=document.querySelector(".cardWrap");

enterBtn.onclick=()=>{

document.getElementById("intro").style.display="none";

/* show bees */
bee1.style.display="block";
bee2.style.display="block";
bee3.style.display="block";

/* music */
zen.volume=0;
zen.play();
let v=0;
const fade=setInterval(()=>{
if(v<0.22){v+=0.02;zen.volume=v;}
else clearInterval(fade);
},200);

/* 🐝 LEFT BEES */
bee1.animate([
{transform:"translate(0,0)"},
{transform:"translate(40vw,-30px)"},
{transform:"translate(80vw,10px)"},
{transform:"translate(120vw,-10px)"}
],{duration:4200,easing:"ease-out"});

bee2.animate([
{transform:"translate(0,0)"},
{transform:"translate(50vw,40px)"},
{transform:"translate(90vw,-20px)"},
{transform:"translate(130vw,0)"}
],{duration:5000,easing:"ease-out"});

/* 🐝 RIGHT BEE */
bee3.animate([
{transform:"translate(0,0)"},
{transform:"translate(-40vw,-40px)"},
{transform:"translate(-80vw,20px)"},
{transform:"translate(-120vw,-10px)"}
],{duration:4600,easing:"ease-out"});

/* letter */
setTimeout(()=>{
letter.animate([
{transform:"translate(-50%,-220px)",opacity:0},
{transform:"translate(-50%,20px)",opacity:1},
{transform:"translate(-50%,0)",opacity:1}
],{duration:1400,fill:"forwards"});
},4600);

/* hint */
setTimeout(()=>{hint.style.opacity=1},7800);
};

letter.onclick=()=>{
bee1.style.display="none";
bee2.style.display="none";
bee3.style.display="none";
letter.style.display="none";
hint.style.display="none";
invite.style.display="flex";
setTimeout(()=>cardWrap.classList.add("shimmer"),300);
};
</script>

</body>
</html>
