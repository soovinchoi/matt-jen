<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPA210 Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  background:#0f0f10;
  font-family:'Cormorant Garamond', serif;
  color:#f4f1ea;
  overflow:hidden;
}

/* ===== TRUE CENTER ===== */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* stack content */
.introStack{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* text */
.title{
  font-family:'Cinzel', serif;
  font-size:clamp(24px,5vw,32px);
  letter-spacing:.22em;
}

.subtitle{
  font-family:'Cinzel', serif;
  font-size:clamp(11px,3vw,14px);
  letter-spacing:.35em;
  opacity:.85;
}

/* image */
.heroImg{
  width:90vw;
  max-width:520px;
  max-height:60vh;
  object-fit:contain;
  border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* button */
.enterBtn{
  padding:12px 28px;
  border-radius:999px;
  border:1.5px solid #f4f1ea;
  background:transparent;
  color:#f4f1ea;
  font-family:'Cinzel', serif;
  letter-spacing:.25em;
  cursor:pointer;
}

/* ===== STEAM ===== */
.steam{
  position:fixed;
  inset:0;
  pointer-events:none;
}

.steam span{
  position:absolute;
  bottom:-100px;
  width:120px;
  height:120px;
  background:radial-gradient(circle,rgba(255,255,255,.15),transparent);
  border-radius:50%;
  filter:blur(8px);
  animation:steamUp linear infinite;
}

.steam span:nth-child(1){left:10%;animation-duration:20s}
.steam span:nth-child(2){left:40%;animation-duration:24s}
.steam span:nth-child(3){left:70%;animation-duration:22s}

@keyframes steamUp{
  0%{transform:translateY(0);opacity:0}
  20%{opacity:.2}
  100%{transform:translateY(-100vh);opacity:0}
}

/* ===== BEES ===== */
.bee{
  position:fixed;
  width:clamp(55px,10vw,75px);
  display:none;
}

#bee1{ top:10%; left:-120px; }
#bee2{ top:20%; left:-140px; }
#bee3{ top:15%; right:-120px; }

/* ===== LETTER ===== */
#letter{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  cursor:pointer;
}

.letterImg{
  width:clamp(220px,50vw,320px);
}

/* ===== HINT ===== */
#hint{
  position:fixed;
  top:calc(50% + 160px);
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  font-family:'Cinzel', serif;
}

/* ===== INVITE ===== */
#invite{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
}

.card{
  width:90vw;
  max-width:700px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="introStack">
    <div class="title">SPA210</div>
    <div class="subtitle">PRIVATE OPENING</div>
    <img src="spa.png" class="heroImg">
    <div class="enterBtn">ENTER</div>
  </div>
</div>

<!-- STEAM -->
<div class="steam">
<span></span><span></span><span></span>
</div>

<!-- BEES -->
<img src="bee1.png" class="bee" id="bee1">
<img src="bee2.png" class="bee" id="bee2">
<img src="bee3.png" class="bee" id="bee3">

<!-- LETTER -->
<div id="letter">
  <img src="letter.png" class="letterImg">
</div>

<div id="hint">Tap the letter</div>

<!-- INVITE -->
<div id="invite">
  <img src="invite.png" class="card">
</div>

<audio id="zen" loop>
<source src="zen.mp3">
</audio>

<script>
const enterBtn=document.querySelector(".enterBtn");
const bee1=document.getElementById("bee1");
const bee2=document.getElementById("bee2");
const bee3=document.getElementById("bee3");
const letter=document.getElementById("letter");
const hint=document.getElementById("hint");
const invite=document.getElementById("invite");
const zen=document.getElementById("zen");

enterBtn.onclick=()=>{
document.getElementById("intro").style.display="none";

/* show bees */
bee1.style.display="block";
bee2.style.display="block";
bee3.style.display="block";

/* music */
zen.volume=0.3;
zen.play();

/* bees */
bee1.animate([{transform:"translate(0,0)"},{transform:"translate(100vw,-20px)"}],{duration:4200});
bee2.animate([{transform:"translate(0,0)"},{transform:"translate(110vw,20px)"}],{duration:5000});
bee3.animate([{transform:"translate(0,0)"},{transform:"translate(-100vw,-30px)"}],{duration:4600});

/* letter */
setTimeout(()=>{
letter.style.opacity=1;
},4600);

/* hint */
setTimeout(()=>{
hint.style.opacity=1;
},7800);
};

letter.onclick=()=>{
bee1.style.display="none";
bee2.style.display="none";
bee3.style.display="none";
letter.style.display="none";
hint.style.display="none";
invite.style.display="flex";
};
</script>

</body>
</html>
